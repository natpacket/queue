version: 2

project_name: queue

before:
  hooks:
    - go mod tidy

# Library, no binaries to build.
builds:
  - skip: true

source:
  enabled: true
  format: tar.gz
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"

checksum:
  name_template: "checksums.txt"

sboms:
  - id: source-sbom
    artifacts: source
    documents:
      - "{{ .ProjectName }}-{{ .Version }}.spdx.json"

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --oidc-issuer=https://token.actions.githubusercontent.com
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
      - --yes
    artifacts: all

release:
  github:
    owner: adrianbrad
    name: queue
  prerelease: auto
  mode: replace
  footer: |
    ## Verification

    All release artifacts are signed with cosign keyless signing via Sigstore.
    To verify the checksums file, for example:

    ```bash
    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      --certificate-identity-regexp '^https://github.com/adrianbrad/queue/\.github/workflows/release\.yaml@refs/tags/' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      checksums.txt
    ```

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))?!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))?!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^style:'
      - '^build:'
      - '^ci:'
      - 'Merge pull request'
