version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: "monday"
      time: "06:00" # 9 am in romania
    commit-message:
      prefix: "build(deps)"
    reviewers:
      - "adrianbrad"
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: "monday"
      time: "06:00" # 9 am in romania
    commit-message:
      prefix: "build(deps)"
    reviewers:
      - "adrianbrad"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"